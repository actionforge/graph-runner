yaml-version: 3.0

id: parallel-multi-queue
name: Parallel Multi Queue
version: 1
description: Execute a set of tasks in parallel with a multi-queue.
style:
  header:
    background: "rgb(44, 53, 65)"
  body:
    background: "linear-gradient(to right, rgb(19 70 82), rgb(10 128 120))"
outputs:
  exec-body:
    name: Body
    exec: true
    index: 0
  context:
    name: Array
    type: unknown
    index: 1
  exec-finish:
    name: Finish
    exec: true
    index: 2
inputs:
  exec:
    exec: true
    index: 0
  worker_count:
    name: Worker Count
    type: number
    index: 1
    default: 4
    required: true
    step: 1
  context:
    name: Array Element
    type: unknown
    index: 2
