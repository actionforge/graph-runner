yaml-version: 3.0

id: file-read
name: File Read
version: 1
description: Read a file from the file system via a stream.
style:
  header:
    background: "rgb(197, 147, 31)"
  body:
    background: "rgb(131, 81, 58)"
outputs:
  exec:
    name: Exec
    exec: true
    index: 0
  stream:
    name: Stream
    type: any
    index: 1
inputs:
  exec:
    exec: true
    index: 0
  mode:
    name: Mode
    index: 1
    type: option
    default: stream
    options:
      - name: String
        value: string
      - name: Stream
        value: stream
  path:
    name: Path
    type: string
    index: 2
    required: true
