yaml-version: 3.0

id: run-exec
name: Run Executable
version: 1
description: Run executable
style:
  header:
    background: "#393836"
  body:
    background: "#292929"
outputs:
  exec-success:
    name: Success
    exec: true
    index: 0
  exec-err:
    name: Error
    exec: true
    index: 1
  output:
    type: string
    name: Output
    index: 2
  exit_code:
    name: Exit Code
    type: number
    index: 3
inputs:
  exec:
    exec: true
    index: 0
  path:
    type: string
    name: Path
    index: 1
  args:
    name: Arguments
    type: "[]string"
    index: 2
  stdin:
    type: any
    name: Stdin
    index: 3
  print:
    name: Print
    type: option
    index: 4
    default: both
    options:
      - name: Output
        value: output
      - name: Stdout
        value: stdout
      - name: Both
        value: both
  env:
    name: Environment Vars
    type: "[]string"
    index: 5
    hint: "e.g: MY_VAR=VALUE"
