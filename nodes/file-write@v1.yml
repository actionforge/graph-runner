yaml-version: 3.0

id: file-write
name: File Write Stream
version: 1
description: Write a file to the file system.
style:
  header:
    background: "rgb(197, 147, 31)"
  body:
    background: "linear-gradient(90deg, #894715, #5d2b42)"
outputs:
  exec:
    name: Exec
    exec: true
    index: 0
  exec-err:
    name: Error
    exec: true
    index: 1
inputs:
  exec:
    exec: true
    index: 0
  path:
    name: Path
    type: string
    index: 1
    required: true
  content:
    name: Content
    type: any
    index: 2
