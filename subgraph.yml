      - src:
          node: start
          port: args
        dst:
          node: my-print
          port: value
    nodes:
      - id: start
        type: groupnode-start@v1
        position:
          x: -210
          y: -10
      - id: my-print
        type: print@v1
        position:
          x: 250
          y: -190
        inputs:
          script: echo "FOO"
        settings:
          folded: false
    registries: []
    description: ""
  - id: start
    type: start@v1
    position:
      x: -210
      y: -10
    settings:
      folded: false
registries: []
